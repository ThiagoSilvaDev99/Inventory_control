version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: ecommerce_api_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata_ecommerce:/var/lib/postgresql/data

volumes:
  pgdata_ecommerce: